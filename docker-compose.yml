services:
  # Auth Service
  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      PUERTO: ${AUTH_PORT:-3011}
      JWT_SECRETO: ${JWT_SECRETO}
      JWT_SECRET: ${JWT_SECRETO}
      POSTGRES_URL: ${POSTGRES_AUTH_URL}
      DATABASE_URL: ${POSTGRES_AUTH_URL}
      NODE_ENV: ${NODE_ENV:-production}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: https://egoscolombia.com.co
    ports:
      - "${AUTH_PORT:-3011}:${AUTH_PORT:-3011}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Catalog Service
  catalog-service:
    build:
      context: ./backend/services/catalog-service
      dockerfile: Dockerfile
    container_name: catalog-service
    environment:
      PUERTO: ${CATALOG_PORT:-3002}
      MONGODB_URI: ${MONGODB_CATALOG_URI}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "${CATALOG_PORT:-3002}:${CATALOG_PORT:-3002}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Transaction Service
  transaction-service:
    build:
      context: ./backend/services/transaction-service
      dockerfile: Dockerfile
    container_name: transaction-service
    environment:
      PUERTO: ${TRANSACTION_PORT:-3003}
      JWT_SECRETO: ${JWT_SECRETO}
      JWT_SECRET: ${JWT_SECRETO}
      DATABASE_URL: ${POSTGRES_TRANSACTION_URL}
      NODE_ENV: ${NODE_ENV:-production}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: https://egoscolombia.com.co
      EPAYCO_P_CUST_ID: "1578536"
      EPAYCO_P_KEY: "5c2d1c361edfc7a4d965512d5292107ee5e6b47c"
      EPAYCO_PUBLIC_KEY: "24ff35222124cc847bf0a05230de7ec4"
      EPAYCO_PRIVATE_KEY: "f01b73cbac63a43d5e2150fae7a78dd5"
      EPAYCO_TEST: "false"
    ports:
      - "${TRANSACTION_PORT:-3003}:${TRANSACTION_PORT:-3003}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Social Service
  social-service:
    build:
      context: ./backend/services/social-service
      dockerfile: Dockerfile
    container_name: social-service
    environment:
      PUERTO: 3004
      MONGODB_URI: ${MONGODB_SOCIAL_URI}
    ports:
      - "3004:3004"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Marketing Service
  marketing-service:
    build:
      context: ./backend/services/marketing-service
      dockerfile: Dockerfile
    container_name: marketing-service
    environment:
      PUERTO: 3006
      DATABASE_URL: ${POSTGRES_MARKETING_URL}
      FRONTEND_URL: https://egoscolombia.com.co
    ports:
      - "3006:3006"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # AI Service
  ai-service:
    build:
      context: ./backend/services/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    environment:
      PUERTO: 3007
      MONGODB_CATALOG_URI: ${MONGODB_CATALOG_URI}
      MONGODB_SOCIAL_URI: ${MONGODB_SOCIAL_URI}
      MONGODB_AI_URI: ${MONGODB_AI_URI}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID}
      GOOGLE_REGION: ${GOOGLE_REGION}
      REDIS_URL: redis://redis:6379
    ports:
      - "3007:3007"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Gateway
  gateway:
    build:
      context: ./simple-gateway
      dockerfile: Dockerfile
    container_name: gateway
    environment:
      PUERTO: ${GATEWAY_PORT:-3000}
      FRONTEND_URL: https://egoscolombia.com.co
      NODE_OPTIONS: "--max-http-header-size=16384"
    ports:
      - "${GATEWAY_PORT:-3000}:${GATEWAY_PORT:-3000}"
    depends_on:
      - auth-service
      - catalog-service
      - transaction-service
    networks:
      - estilo-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://149.130.182.9:3000
    container_name: frontend
    environment:
      VITE_API_URL: http://149.130.182.9:3000
    ports:
      - "${FRONTEND_PORT:-3005}:${FRONTEND_PORT:-3005}"
    depends_on:
      - gateway
    networks:
      - estilo-network
    restart: unless-stopped

  # Credit Service
  credit-service:
    build:
      context: ./backend/services/credit-service
      dockerfile: Dockerfile
    container_name: credit-service
    environment:
      PUERTO: ${CREDIT_PORT:-3008}
      DATABASE_URL: ${POSTGRES_CREDIT_URL}
    ports:
      - "${CREDIT_PORT:-3008}:${CREDIT_PORT:-3008}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Logistics Service
  logistics-service:
    build:
      context: ./backend/services/logistics-service
      dockerfile: Dockerfile
    container_name: logistics-service
    environment:
      PUERTO: ${LOGISTICS_PORT:-3009}
    ports:
      - "${LOGISTICS_PORT:-3009}:${LOGISTICS_PORT:-3009}"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Facturacion Service
  facturacion-service:
    build:
      context: ./backend/services/facturacion-service
      dockerfile: Dockerfile
    container_name: facturacion-service
    environment:
      PUERTO: 3010
      DATABASE_URL: ${POSTGRES_FACTURACION_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: https://egoscolombia.com.co
      AUTH_SERVICE_URL: http://auth-service:3011
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
      DIAN_SOFTWARE_ID: b7249493-84cf-430c-be82-64c830a2158c
      DIAN_CLAVE_TECNICA: fc8eac422eba16e22ffd8c6f94b3f40a6e38162c
      DIAN_PIN: "20191"
      DIAN_TEST_SET_ID: c5f5fbef-6621-420b-b986-857b2f1588d5
      DIAN_PREFIJO: SETP
      DIAN_RESOLUCION: "18760000001"
      DIAN_AMBIENTE: "2"
    ports:
      - "3010:3010"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Contabilidad Service
  contabilidad-service:
    build:
      context: ./backend/services/contabilidad-service
      dockerfile: Dockerfile
    container_name: contabilidad-service
    environment:
      PUERTO: 3012
      DATABASE_URL: ${POSTGRES_CONTABILIDAD_URL}
      TRANSACTION_DB_URL: ${POSTGRES_TRANSACTION_URL}
    ports:
      - "3012:3012"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - estilo-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - estilo-network
    restart: unless-stopped

networks:
  estilo-network:
    driver: bridge
