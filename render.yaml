services:
  # ─── AUTH SERVICE ───────────────────────────────────────────
  - type: web
    name: auth-service
    runtime: docker
    dockerfilePath: ./backend/services/auth-service/Dockerfile
    dockerContext: ./backend/services/auth-service
    envVars:
      - key: PUERTO
        value: 3011
      - key: JWT_SECRETO
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── CATALOG SERVICE ────────────────────────────────────────
  - type: web
    name: catalog-service
    runtime: docker
    dockerfilePath: ./backend/services/catalog-service/Dockerfile
    dockerContext: ./backend/services/catalog-service
    envVars:
      - key: PUERTO
        value: 3002
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ─── TRANSACTION SERVICE ────────────────────────────────────
  - type: web
    name: transaction-service
    runtime: docker
    dockerfilePath: ./backend/services/transaction-service/Dockerfile
    dockerContext: ./backend/services/transaction-service
    envVars:
      - key: PUERTO
        value: 3003
      - key: JWT_SECRETO
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── SOCIAL SERVICE ─────────────────────────────────────────
  - type: web
    name: social-service
    runtime: docker
    dockerfilePath: ./backend/services/social-service/Dockerfile
    dockerContext: ./backend/services/social-service
    envVars:
      - key: PUERTO
        value: 3004
      - key: MONGODB_URI
        sync: false

  # ─── MARKETING SERVICE ──────────────────────────────────────
  - type: web
    name: marketing-service
    runtime: docker
    dockerfilePath: ./backend/services/marketing-service/Dockerfile
    dockerContext: ./backend/services/marketing-service
    envVars:
      - key: PUERTO
        value: 3006
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── AI SERVICE ─────────────────────────────────────────────
  - type: web
    name: ai-service
    runtime: docker
    dockerfilePath: ./backend/services/ai-service/Dockerfile
    dockerContext: ./backend/services/ai-service
    envVars:
      - key: PUERTO
        value: 3007
      - key: MONGODB_CATALOG_URI
        sync: false
      - key: MONGODB_SOCIAL_URI
        sync: false
      - key: MONGODB_AI_URI
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false

  # ─── CREDIT SERVICE ─────────────────────────────────────────
  - type: web
    name: credit-service
    runtime: docker
    dockerfilePath: ./backend/services/credit-service/Dockerfile
    dockerContext: ./backend/services/credit-service
    envVars:
      - key: PUERTO
        value: 3008
      - key: DATABASE_URL
        sync: false

  # ─── LOGISTICS SERVICE ──────────────────────────────────────
  - type: web
    name: logistics-service
    runtime: docker
    dockerfilePath: ./backend/services/logistics-service/Dockerfile
    dockerContext: ./backend/services/logistics-service
    envVars:
      - key: PUERTO
        value: 3009

  # ─── GATEWAY ────────────────────────────────────────────────
  - type: web
    name: gateway
    runtime: docker
    dockerfilePath: ./simple-gateway/Dockerfile
    dockerContext: ./simple-gateway
    envVars:
      - key: PUERTO
        value: 3000
      - key: FRONTEND_URL
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: CATALOG_SERVICE_URL
        sync: false
      - key: TRANSACTION_SERVICE_URL
        sync: false
      - key: SOCIAL_SERVICE_URL
        sync: false
      - key: MARKETING_SERVICE_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: CREDIT_SERVICE_URL
        sync: false
      - key: LOGISTICS_SERVICE_URL
        sync: false

  # ─── FRONTEND ───────────────────────────────────────────────
  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        sync: false
