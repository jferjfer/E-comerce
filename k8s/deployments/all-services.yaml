apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturacion-service
  namespace: egos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: facturacion-service
  template:
    metadata:
      labels:
        app: facturacion-service
    spec:
      containers:
      - name: facturacion-service
        image: us-central1-docker.pkg.dev/crypto-topic-492202-q9/egos-registry/facturacion-service:latest
        ports:
        - containerPort: 3010
        env:
        - name: PUERTO
          value: "3010"
        - name: FRONTEND_URL
          value: "https://egoscolombia.com.co"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:3011"
        - name: TRANSACTION_SERVICE_URL
          value: "http://transaction-service:3003"
        - name: DIAN_P12_PATH
          value: "/app/certs/certificado.pfx"
        - name: DIAN_P12_PASSWORD
          valueFrom:
            secretKeyRef:
              name: egos-certificado-dian
              key: password
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_PORT
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_USER_VENTAS
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_PASS_VENTAS
        - name: DIAN_SOFTWARE_ID
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: DIAN_SOFTWARE_ID
        - name: DIAN_CLAVE_TECNICA
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: DIAN_CLAVE_TECNICA
        - name: DIAN_PIN
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: DIAN_PIN
        - name: DIAN_AMBIENTE
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: DIAN_AMBIENTE
        - name: DIAN_TEST_SET_ID
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: DIAN_TEST_SET_ID
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: POSTGRES_FACTURACION_URL
        volumeMounts:
        - name: cert-dian
          mountPath: /app/certs
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: cert-dian
        secret:
          secretName: egos-certificado-dian
          items:
          - key: certificado.pfx
            path: certificado.pfx
---
apiVersion: v1
kind: Service
metadata:
  name: facturacion-service
  namespace: egos
spec:
  selector:
    app: facturacion-service
  ports:
  - port: 3010
    targetPort: 3010
---
