apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: egos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: us-central1-docker.pkg.dev/crypto-topic-492202-q9/egos-registry/auth-service:latest
        ports:
        - containerPort: 3011
        env:
        - name: PUERTO
          value: "3011"
        - name: NODE_ENV
          value: "production"
        - name: FRONTEND_URL
          value: "http://frontend-service"
        - name: JWT_SECRETO
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: JWT_SECRETO
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: JWT_SECRETO
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: POSTGRES_AUTH_URL
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: egos
spec:
  selector:
    app: auth-service
  ports:
  - port: 3011
    targetPort: 3011
---
