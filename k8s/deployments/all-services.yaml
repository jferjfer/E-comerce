            secretKeyRef:
              name: egos-secrets
              key: EPAYCO_PRIVATE_KEY
              optional: true
        - name: EPAYCO_TEST
          value: "false"
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_HOST
