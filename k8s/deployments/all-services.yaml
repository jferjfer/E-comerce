              key: SMTP_PORT
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_USER_VENTAS
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: SMTP_PASS_VENTAS
        - name: JWT_SECRETO
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: JWT_SECRETO
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: JWT_SECRETO
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: egos-secrets
              key: POSTGRES_TRANSACTION_URL
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: egos
spec:
  selector:
    app: transaction-service
