apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: egos
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'ai-service'
        static_configs:
          - targets: ['ai-service:3007']
        metrics_path: '/metrics'
        scrape_interval: 10s

      - job_name: 'gateway'
        static_configs:
          - targets: ['gateway-service:80']
        metrics_path: '/metrics'
        scrape_interval: 15s

      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service:3011']
        metrics_path: '/metrics'
        scrape_interval: 15s

      - job_name: 'catalog-service'
        static_configs:
          - targets: ['catalog-service:3002']
        metrics_path: '/metrics'
        scrape_interval: 15s

      - job_name: 'transaction-service'
        static_configs:
          - targets: ['transaction-service:3003']
        metrics_path: '/metrics'
        scrape_interval: 15s

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-service:6379']
        scrape_interval: 15s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: egos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=7d'
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: egos
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: egos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "EgosAdmin2024!"
        - name: GF_SERVER_ROOT_URL
          value: "https://monitor.egoscolombia.com.co"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: egos
spec:
  selector:
    app: grafana
  ports:
  - port: 80
    targetPort: 3000
