apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: egos-ingress
  namespace: egos
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "egos-ip"
    networking.gke.io/managed-certificates: "egos-ssl"
    kubernetes.io/ingress.allow-http: "false"
    cloud.google.com/backend-config: '{"default": "egos-backend-config"}'
spec:
  rules:
  - host: egoscolombia.com.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: www.egoscolombia.com.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.egoscolombia.com.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
  - host: monitor.egoscolombia.com.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: egos-ssl
  namespace: egos
spec:
  domains:
  - egoscolombia.com.co
  - www.egoscolombia.com.co
  - api.egoscolombia.com.co
  - monitor.egoscolombia.com.co
