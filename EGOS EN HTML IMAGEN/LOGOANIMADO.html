<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGOS - Wear Your Truth (Cinematic)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700&family=Prata&display=swap');
        
        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Prata', serif;
            color: #ffffff;
            overflow: hidden;
        }

        .canvas {
            width: 100%;
            max-width: 800px;
            padding: 60px;
            text-align: center;
            perspective: 1000px;
        }

        /* Animación del Monograma */
        .monogram {
            font-family: 'Bodoni Moda', serif;
            font-size: 280px;
            line-height: 1;
            margin: 0;
            /* Degradado con brillo animado */
            background: linear-gradient(135deg, 
                #c5a47e 0%, 
                #e2c9af 25%, 
                #ffffff 50%, 
                #e2c9af 75%, 
                #a67c52 100%);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
            letter-spacing: -15px;
            
            /* Estado Inicial */
            opacity: 0;
            filter: blur(20px);
            transform: translateY(20px) scale(0.95);
            animation: 
                revealMain 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                shimmer 8s linear infinite;
        }

        /* Animación del Nombre */
        .brand-name {
            font-size: 85px;
            letter-spacing: 35px;
            margin-top: -20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 400;
            
            /* Estado Inicial */
            opacity: 0;
            letter-spacing: 50px; /* Empieza más expandido */
            filter: blur(10px);
            transform: translateY(10px);
            animation: revealBrand 3s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
        }

        /* Línea divisoria */
        .divider {
            width: 0; /* Empieza sin ancho */
            height: 1px;
            background: linear-gradient(90deg, transparent, #c5a47e, transparent);
            margin: 30px auto;
            opacity: 0.4;
            animation: expandDivider 2s ease-in-out 1.5s forwards;
        }

        /* Eslogan */
        .slogan {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 20px;
            letter-spacing: 15px;
            color: #c5a47e;
            text-transform: uppercase;
            margin-top: 40px;
            
            /* Estado Inicial */
            opacity: 0;
            animation: fadeIn 2s ease-out 2.5s forwards;
        }

        /* Definición de Keyframes */
        @keyframes revealMain {
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        @keyframes revealBrand {
            to {
                opacity: 1;
                filter: blur(0);
                letter-spacing: 35px;
                transform: translateY(0);
            }
        }

        @keyframes expandDivider {
            to {
                width: 150px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 0.8; transform: translateY(0); }
        }

        /* Brillo ambiental de fondo suave */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(197, 164, 126, 0.05) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulseGlow 10s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="canvas">
        <!-- Monograma Central -->
        <div class="monogram">E</div>
        
        <!-- Nombre de la Marca -->
        <div class="brand-name">EGOS</div>
        
        <div class="divider"></div>

        <!-- Eslogan -->
        <div class="slogan">Wear Your Truth</div>
    </div>

</body>
</html>
