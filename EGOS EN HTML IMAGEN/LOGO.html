<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGOS - I HAVE IT (Netrio Design)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700&family=Prata&display=swap');
        
        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Prata', serif;
            color: #ffffff;
        }

        .canvas {
            width: 100%;
            max-width: 800px;
            padding: 60px;
            text-align: center;
        }

        .monogram {
            font-family: 'Bodoni Moda', serif;
            font-size: 280px;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, #c5a47e 0%, #e2c9af 50%, #a67c52 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
            letter-spacing: -15px;
        }

        .brand-name {
            font-size: 85px;
            letter-spacing: 35px;
            margin-top: -20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .slogan {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 20px;
            letter-spacing: 15px;
            color: #c5a47e;
            text-transform: uppercase;
            margin-top: 40px;
            opacity: 0.8;
        }

        .divider {
            width: 150px;
            height: 1px;
            background: #c5a47e;
            margin: 30px auto;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <!-- Monograma Central -->
        <div class="monogram">E</div>
        
        <!-- Nombre de la Marca -->
        <div class="brand-name">EGOS</div>
        
        <div class="divider"></div>

        <!-- Eslogan Original -->
        <div class="slogan">Wear Your Truth</div>
    </div>

</body>
</html>
